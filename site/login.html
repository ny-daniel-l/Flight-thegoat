<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight vs Cash | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="site-header">
    <a class="site-logo" href="index.html"><span>Flight</span> VS <span>Cash</span></a>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="creators.html">Creators</a>
      <a href="register.html">Register</a>
      <a href="login.html" class="active">Login</a>
      <a href="contact.html">Kontakt</a>
    </nav>
  </header>

  <main>

    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">Willkommen zurück</p>
        <h1 class="page-title">Login</h1>
      </div>
    </section>

    <section class="content-section">
      <div class="container form-container">
        <form class="form form-login" action="creators.html" method="get">

          <div class="form-row">
            <label for="login-email">E-Mail</label>
            <input id="login-email" name="email" type="email" required>
          </div>

          <div class="form-row">
            <label for="login-password">Passwort</label>
            <input id="login-password" name="password" type="password" required>
          </div>

          <div class="form-actions">
            <button class="button button-orange" type="submit">Login</button>
            <a href="password-forgot.html">Passwort vergessen?</a>
          </div>

        </form>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p><span class="text-orange">Flight</span> VS <span class="text-blue">Cash</span></p>
    <p>Fan-Projekt für Modul 293.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
